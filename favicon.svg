<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Safal Bhalerao">
  <defs>
    <linearGradient id="ring" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7cc4ff"/>
      <stop offset="0.55" stop-color="#4da6ff"/>
      <stop offset="1" stop-color="#ff6b4a"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#05070d"/>
  <!-- accretion disk -->
  <circle cx="16" cy="16" r="8.4" fill="none" stroke="url(#ring)" stroke-width="3.2"/>
  <!-- event horizon -->
  <circle cx="16" cy="16" r="4.6" fill="#05070d"/>
</svg>
