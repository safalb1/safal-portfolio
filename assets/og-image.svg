<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="80%" cy="26%" r="62%">
      <stop offset="0" stop-color="#0d1730"/>
      <stop offset="1" stop-color="#05070d"/>
    </radialGradient>
    <linearGradient id="ring" x1="780" y1="120" x2="1080" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7cc4ff"/>
      <stop offset="0.55" stop-color="#4da6ff"/>
      <stop offset="1" stop-color="#ff6b4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7cc4ff"/>
      <stop offset="1" stop-color="#ff6b4a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- black hole / accretion disk, right side -->
  <g transform="translate(935,250)">
    <circle r="152" fill="none" stroke="url(#ring)" stroke-width="22"/>
    <circle r="172" fill="none" stroke="#7cc4ff" stroke-width="2" opacity="0.35"/>
    <circle r="80" fill="#05070d"/>
  </g>

  <!-- type -->
  <text x="90" y="232" font-family="Arial, Helvetica, sans-serif" font-size="38" letter-spacing="7" fill="#8b95ad">AI / LLM ANALYST</text>
  <text x="84" y="352" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="116" letter-spacing="-2" fill="#e9edf7">SAFAL</text>
  <text x="84" y="466" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="116" letter-spacing="-2" fill="#e9edf7">BHALERAO</text>
  <rect x="90" y="512" width="130" height="6" rx="3" fill="url(#accent)"/>
  <text x="240" y="523" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#8b95ad">Data Annotation · LLM Evaluation · Quality</text>
</svg>
